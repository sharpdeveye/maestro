name: Build Extension

on:
  push:
    branches: [main]
    paths:
      - 'maestro-extension/**'
  pull_request:
    branches: [main]
    paths:
      - 'maestro-extension/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install extension dependencies
        run: npm ci
        working-directory: maestro-extension

      - name: Install webview dependencies
        run: npm ci
        working-directory: maestro-extension/webview-ui

      - name: Build extension (bundle skills + ext + webview)
        run: npm run build
        working-directory: maestro-extension

      - name: Package VSIX
        run: npx -y @vscode/vsce package --no-dependencies
        working-directory: maestro-extension

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: maestro-workflow-vsix
          path: maestro-extension/*.vsix
          retention-days: 30
